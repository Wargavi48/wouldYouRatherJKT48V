<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <style>
      .blob { opacity: 0.10; }
      .ring { fill: none; stroke-width: 2; opacity: 0.16; }
      .dash { fill: none; stroke-width: 2.5; stroke-dasharray: 2 10; stroke-linecap: round; opacity: 0.22; }
      .dot { opacity: 0.18; }
    </style>
  </defs>

  <rect width="1200" height="1200" fill="#faf6ef"/>

  <!-- soft coral blobs -->
  <circle class="blob" cx="120" cy="160" r="220" fill="#ff6b4a"/>
  <circle class="blob" cx="1040" cy="980" r="260" fill="#ff6b4a"/>
  <circle class="blob" cx="980" cy="140" r="120" fill="#ff6b4a"/>

  <!-- soft teal blobs -->
  <circle class="blob" cx="1090" cy="420" r="190" fill="#2d6e7e"/>
  <circle class="blob" cx="90" cy="980" r="230" fill="#2d6e7e"/>
  <circle class="blob" cx="150" cy="650" r="100" fill="#2d6e7e"/>

  <!-- thin rings -->
  <circle class="ring" cx="300" cy="950" r="60" stroke="#ff6b4a"/>
  <circle class="ring" cx="950" cy="260" r="44" stroke="#2d6e7e"/>
  <circle class="ring" cx="620" cy="80" r="30" stroke="#d4a23a"/>
  <circle class="ring" cx="60" cy="380" r="36" stroke="#ff6b4a"/>

  <!-- dotted "either / or" paths, echoing the app's choice mechanic -->
  <path class="dash" d="M 200 300 Q 350 250 480 340" stroke="#ff6b4a"/>
  <path class="dash" d="M 200 300 Q 280 420 380 480" stroke="#2d6e7e"/>

  <path class="dash" d="M 760 760 Q 880 700 980 800" stroke="#2d6e7e"/>
  <path class="dash" d="M 760 760 Q 700 880 800 980" stroke="#ff6b4a"/>

  <!-- scattered small dots -->
  <circle class="dot" cx="500" cy="150" r="5" fill="#d4a23a"/>
  <circle class="dot" cx="700" cy="500" r="4" fill="#ff6b4a"/>
  <circle class="dot" cx="430" cy="700" r="5" fill="#2d6e7e"/>
  <circle class="dot" cx="900" cy="600" r="4" fill="#d4a23a"/>
  <circle class="dot" cx="250" cy="550" r="4" fill="#ff6b4a"/>
  <circle class="dot" cx="1100" cy="750" r="5" fill="#2d6e7e"/>
  <circle class="dot" cx="600" cy="950" r="4" fill="#d4a23a"/>
</svg>
