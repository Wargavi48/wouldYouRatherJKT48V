<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Would You Rather</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤔</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ===================== GAME SCREEN ===================== -->
  <div id="game-area">
    <div class="top-bar">
      <div class="cat-tag" id="catTag">Memuat...</div>
      <div class="top-bar-actions">
        <button class="icon-btn" id="menuOpenBtn" aria-label="Buka daftar kategori">&#9776;</button>
        <div class="music-wrap" id="musicWrap">
          <button class="icon-btn" id="musicToggleBtn" aria-label="Bisukan/aktifkan musik">&#127925;</button>
          <div class="volume-popover" id="volumePopover">
            <button class="mute-btn" id="nextSongBtn" aria-label="Lagu berikutnya">&#9197;</button>
            <input type="range" id="volumeSlider" min="0" max="100" value="50" aria-label="Volume musik">
          </div>
        </div>
      </div>
    </div>
    <div class="arena">
      <div class="progress-tag" id="progressTag"></div>
      <p class="prompt-row">aku memilih</p>

      <div class="cards-row">
        <button class="card-choice left" id="choiceTop">
          <div class="card-inner">
            <div class="choice-label" id="labelTop"></div>
            <div class="bar-track" id="barTrackTop"><div class="bar-fill" id="barFillTop"></div></div>
            <div class="pct-label" id="pctTop"></div>
          </div>
        </button>

        <button class="card-choice right" id="choiceBottom">
          <div class="card-inner">
            <div class="choice-label" id="labelBottom"></div>
            <div class="bar-track" id="barTrackBottom"><div class="bar-fill" id="barFillBottom"></div></div>
            <div class="pct-label" id="pctBottom"></div>
          </div>
        </button>
      </div>
    </div>

    <div class="footer-row">
      <span class="tally" id="tally"></span>
      <button class="auto-pill" id="autoPill"></button>
    </div>
  </div>

  <!-- ===================== MENU SCREEN ===================== -->
  <div id="menu-screen">
    <div class="menu-panel">
      <div class="sheet-handle"></div>
      <div class="menu-header">
        <h2>Semua kategori</h2>
        <button class="icon-btn" id="menuCloseBtn" aria-label="Tutup">&#10005;</button>
      </div>
      <div class="menu-list" id="menuList"></div>
      <button class="add-fab" id="addCatBtn" aria-label="Tambah kategori baru">+</button>
    </div>
  </div>

  <!-- ===================== FORM SCREEN ===================== -->
  <div id="form-screen">
    <div class="form-panel">
      <div class="sheet-handle"></div>
      <div class="menu-header">
        <h2 id="formTitle">Kategori baru</h2>
        <button class="icon-btn" id="formCloseBtn" aria-label="Batal">&#10005;</button>
      </div>
      <div class="form-body">
        <div class="field-label">Emoji &amp; nama kategori</div>
        <div class="field-row">
          <input type="text" class="emoji-input" id="catEmojiInput" maxlength="4" placeholder="🎯">
          <input type="text" class="name-input" id="catNameInput" placeholder="Nama kategori (contoh: Olahraga)">
        </div>
        <div class="field-label">Pertanyaan</div>
        <div id="questionList"></div>
        <button class="add-q-btn" id="addQuestionBtn">+ Tambah pertanyaan</button>
        <p class="hint-text">Minimal 1 pertanyaan dengan dua pilihan terisi untuk bisa disimpan.</p>
      </div>
      <div class="save-bar">
        <button class="save-btn" id="saveBtn">Simpan kategori</button>
      </div>
    </div>
  </div>

</div>

<audio id="bgMusic" preload="auto"></audio>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="data.js"></script>
<script src="script.js?v=2"></script>
</body>
</html>
